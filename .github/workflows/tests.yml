name: Tests

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  django:
    name: Django checks and tests
    runs-on: ubuntu-latest

    env:
      DEBUG: "False"
      SECRET_KEY: "ci-secret-key-not-for-production"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: "sqlite:////tmp/mamiru-ops-ci.sqlite3"
      CSRF_TRUSTED_ORIGINS: "http://localhost:8000"
      STATIC_ROOT: "/tmp/mamiru-ops-staticfiles"
      MEDIA_ROOT: "/tmp/mamiru-ops-media"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system checks
        run: python manage.py check

      - name: Run linter
        run: ruff check .

      - name: Run tests
        run: pytest --cov=catalog --cov-report=term-missing
